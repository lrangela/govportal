name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CI: true
  NX_DAEMON: false
  FORCE_COLOR: 1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Generate mock DB
        run: npx tsx tools/mock-api/generate-db.ts
      - name: Lint
        run: npx nx run-many -t lint --projects=shell,legacy-remote,modern-remote --parallel=3
      - name: Test
        run: npx nx run-many -t test --projects=legacy,shell,legacy-remote,modern-remote --parallel=4
      - name: Build Apps
        if: github.ref == 'refs/heads/main'
        run: npx nx run-many -t build --projects=shell,legacy-remote,modern-remote --configuration=production --parallel=3

      - name: Stage Pages artifact
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          mkdir -p out/legacy out/modern
          cp -R dist/apps/shell/browser/. out/
          cp -R dist/apps/legacy/browser/. out/legacy/
          cp -R dist/apps/modern/browser/. out/modern/
          
          # Create 404.html for SPA routing support (redirects all to index.html)
          cp out/index.html out/404.html
          
          # Export mock API
          node tools/mock-api/export-pages-api.mjs tools/mock-api/db.json out
          
          # Update federation manifest
          node -e "
            const fs = require('fs');
            const repo = process.env.REPO_NAME;
            const manifest = JSON.parse(fs.readFileSync('out/federation.manifest.json', 'utf8'));
            manifest['legacy-remote'] = './legacy/remoteEntry.json';
            manifest['modern-remote'] = './modern/remoteEntry.json';
            fs.writeFileSync('out/federation.manifest.json', JSON.stringify(manifest, null, 2));
          "
          
          # Patch base href in all index.html files
          node -e "
            const fs = require('fs');
            const repo = process.env.REPO_NAME;
            const baseHref = '/' + repo + '/';
            const patch = (f) => {
              if(!fs.existsSync(f)) return;
              let h = fs.readFileSync(f, 'utf8');
              h = h.replace('<base href=\"/\">', '<base href=\"' + baseHref + '\">');
              fs.writeFileSync(f, h);
            };
            patch('out/index.html');
            patch('out/404.html');
            patch('out/legacy/index.html');
            patch('out/modern/index.html');
          "

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: out
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4