name: CI
on:
  push:
    branches: [main]
  workflow_dispatch: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify Node
        run: node --version
      - name: Success
        run: echo "✅ CI is working - ${{ github.sha }}"
