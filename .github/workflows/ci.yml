name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  CI: true
  NX_DAEMON: false
  FORCE_COLOR: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npx nx run-many -t lint --projects=shell,legacy-remote,modern-remote --parallel=3

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npx tsx tools/mock-api/generate-db.ts
      - run: npx nx run-many -t test --projects=legacy,shell,legacy-remote,modern-remote --parallel=4

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npx nx run-many -t build --projects=shell,legacy-remote,modern-remote --configuration=production --parallel=3
      - uses: actions/upload-artifact@v4
        with:
          name: dist-apps-${{ github.run_id }}
          path: dist/apps
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, unit, build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npx playwright install --with-deps chromium
      - name: Start services and run tests
        run: |
          npx tsx tools/mock-api/generate-db.ts
          nohup npx json-server tools/mock-api/db.json --port 3001 > /dev/null 2>&1 &
          nohup npx nx serve shell > /dev/null 2>&1 &
          nohup npx nx serve legacy-remote > /dev/null 2>&1 &
          nohup npx nx serve modern-remote > /dev/null 2>&1 &
          sleep 30
          npx playwright test --config apps/shell-e2e/playwright.config.ts
